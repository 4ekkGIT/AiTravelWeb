<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AiTravel — Вход для администратора</title>
  <link rel="icon" href="./img/AITravelLogo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #faf9f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      color: #1a1a1a;
    }

    .login-brand h1 span { color: rgb(255, 166, 0); }

    .login-brand p {
      font-size: 13px;
      color: #999;
      margin-top: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .login-card {
      background: #fff;
      border: 1px solid #e8e8e5;
      border-radius: 16px;
      padding: 32px 28px;
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d8d8d5;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #faf9f6;
      transition: border-color 0.15s;
      outline: none;
    }

    .field input:focus {
      border-color: rgb(255, 166, 0);
      background: #fff;
    }

    .error-msg {
      font-size: 13px;
      color: #c0392b;
      background: #fdf0ee;
      border: 1px solid #f5c4b3;
      border-radius: 8px;
      padding: 9px 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-login:hover { opacity: 0.8; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #aaa;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back-link:hover { color: #1a1a1a; }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-brand">
      <h1>Ai<span>Travel</span></h1>
      <p>Панель администратора</p>
    </div>
    <div class="login-card">
      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Пароль администратора" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="loginBtn" onclick="doLogin()">Войти</button>
    </div>

    <a class="back-link" href="index.html">← Вернуться на сайт</a>
  </div>

  <script>
    /* ============================================================
       Supabase config — same project, no secrets here.
       The anon key is safe to use in the browser.
    ============================================================ */
    const SUPABASE_URL = 'https://jrvbynjlpjiridumydop.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_VVymyHB40jv7fOC180fFOQ_Qk1PCWUb';

    /* If a valid session already exists, skip the login form */
    async function checkExistingSession() {
      try {
        const res  = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: {
            'apikey':        SUPABASE_KEY,
            'Authorization': `Bearer ${getStoredToken()}`,
          }
        });
        if (res.ok) {
          window.location.href = 'index.html';
        }
      } catch (_) { /* no session, stay on page */ }
    }

    function getStoredToken() {
      try {
        const raw = localStorage.getItem(
          `sb-${SUPABASE_URL.split('//')[1].split('.')[0]}-auth-token`
        );
        if (!raw) return '';
        return JSON.parse(raw)?.access_token || '';
      } catch { return ''; }
    }

    checkExistingSession();

    /* Login */
    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('errorMsg');
      const btn      = document.getElementById('loginBtn');

      errEl.classList.remove('show');
      btn.textContent = 'Входим...';
      btn.disabled    = true;

      try {
        const res  = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method:  'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey':       SUPABASE_KEY,
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok || !data.access_token) {
          throw new Error(data.error_description || data.msg || 'Неверный email или пароль.');
        }

        /* Store the Supabase session token */
        const tokenKey = `sb-${SUPABASE_URL.split('//')[1].split('.')[0]}-auth-token`;
        localStorage.setItem(tokenKey, JSON.stringify({
          access_token:  data.access_token,
          refresh_token: data.refresh_token,
          expires_at:    Math.floor(Date.now() / 1000) + data.expires_in,
        }));

        /* Also set the simple session flag for nav rendering */
        sessionStorage.setItem('aitravel_admin_session', 'true');

        window.location.href = 'index.html';

      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('show');
        document.getElementById('password').value = '';
      } finally {
        btn.textContent = 'Войти';
        btn.disabled    = false;
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>

</body>
</html>
